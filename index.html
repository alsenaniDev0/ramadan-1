<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تهنئة رمضان</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="ramadan-card">

        <div class="bg-decoration">
            <span class="moon"></span>
            <span class="star star-1">✦</span>
            <span class="star star-2">✧</span>
            <span class="star star-3">✦</span>
            <span class="star star-4">✧</span>
        </div>

        <section class="card-content">

            <div class="lantern lantern-left">
                <span></span>
            </div>

            <div class="lantern lantern-right">
                <span></span>
            </div>

            <div class="top-badge">
                رمضان كريم
            </div>

            <div class="icon-wrap">
                <span>{{icon}}</span>
            </div>

            <h1>
                مبارك عليكم الشهر
            </h1>

            <p class="message">
                {{message}}
            </p>

            <div class="name-box">
                <small>إهداء خاص إلى</small>
                <strong>{{name}}</strong>
            </div>

            <div class="mosque">
                <span class="dome dome-main"></span>
                <span class="dome dome-small dome-1"></span>
                <span class="dome dome-small dome-2"></span>
                <span class="tower tower-1"></span>
                <span class="tower tower-2"></span>
                <span class="base"></span>
            </div>

            <p class="footer-text">
                أعاده الله علينا وعليكم بالخير والقبول
            </p>

        </section>

    </main>
</body>

</html>
